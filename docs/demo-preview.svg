  <text x="645" y="250" fill="#f6f7f4" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Timestamp Explorer</text>
  <text x="645" y="295" fill="#d8e1e8" font-family="Segoe UI, Arial, sans-serif" font-size="24">Find key moments by topic</text>
  <text x="645" y="332" fill="#d8e1e8" font-family="Segoe UI, Arial, sans-serif" font-size="24">Jump instantly to media playback</text>

