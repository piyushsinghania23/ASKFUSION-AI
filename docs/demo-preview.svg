  <text x="105" y="250" fill="#f6f7f4" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Upload, Index, and Chat</text>
  <text x="105" y="295" fill="#d8e1e8" font-family="Segoe UI, Arial, sans-serif" font-size="24">Upload PDF, audio, or video files</text>
