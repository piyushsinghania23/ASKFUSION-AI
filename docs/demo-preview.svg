      <stop offset="0%" stop-color="#071726"/>
      <stop offset="60%" stop-color="#0c2840"/>
      <stop offset="100%" stop-color="#112f49"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a57" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#17324a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <circle cx="130" cy="90" r="130" fill="#ff8e3c" fill-opacity="0.15"/>
  <circle cx="1060" cy="40" r="160" fill="#1ecbe1" fill-opacity="0.14"/>

