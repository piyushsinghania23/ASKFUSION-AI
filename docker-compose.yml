services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: askfusion
      POSTGRES_USER: askfusion
      POSTGRES_PASSWORD: askfusion
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askfusion -d askfusion"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      ASKFUSION_DATABASE_URL: postgresql+psycopg://askfusion:askfusion@postgres:5432/askfusion
      ASKFUSION_UPLOADS_DIR: /app/data/uploads
      ASKFUSION_ALLOWED_ORIGINS: '["http://localhost:5173"]'
      ASKFUSION_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ASKFUSION_ENABLE_OPENAI: ${ASKFUSION_ENABLE_OPENAI:-true}
    volumes:
      - ./backend/data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:

