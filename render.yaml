services:
  - type: web
    name: askfusion-ai-backend
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: ASKFUSION_DATABASE_URL
        fromDatabase:
          name: askfusion-ai-db
          property: connectionString
      - key: ASKFUSION_ALLOWED_ORIGIN_REGEX
        value: "^https://.*\\.onrender\\.com$"
      - key: ASKFUSION_ENABLE_OPENAI
        value: "true"
      - key: ASKFUSION_OPENAI_API_KEY
        sync: false

  - type: web
    name: askfusion-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"

databases:
  - name: askfusion-ai-db
    plan: free
    region: oregon
